apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: competitor-intelligence
    component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: competitor-intelligence
      component: database
  template:
    metadata:
      labels:
        app: competitor-intelligence
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "utservio_ci"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: competitor-intelligence-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: competitor-intelligence-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - utservio
                - -d
                - utservio_ci
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - utservio
                - -d
                - utservio_ci
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: competitor-intelligence
    component: database
spec:
  selector:
    app: competitor-intelligence
    component: database
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  clusterIP: None
