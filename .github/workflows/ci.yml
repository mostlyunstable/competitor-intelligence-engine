name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Ruff
        run: ruff check .
      - name: Run Black
        run: black --check .
      - name: Run MyPy
        run: mypy app/

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: utservio_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: utservio_ci_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U utservio_test -d utservio_ci_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Integration Tests
        env:
          CI_TEST_DATABASE_URL: postgresql+asyncpg://utservio_test:test_password@localhost:5433/utservio_ci_test
        run: pytest tests/integration/ -v --tb=short
      - name: Run All Tests
        env:
          CI_TEST_DATABASE_URL: postgresql+asyncpg://utservio_test:test_password@localhost:5433/utservio_ci_test
        run: pytest tests/ -v --cov=app --cov-report=xml
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
