services:
  postgres-test:
    image: postgres:16-alpine
    container_name: utservio-ci-postgres-test
    restart: "no"
    environment:
      - POSTGRES_USER=utservio_test
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_DB=utservio_ci_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utservio_test -d utservio_ci_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
