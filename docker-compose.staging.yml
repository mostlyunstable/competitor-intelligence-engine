version: '3.8'

services:
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://utservio:changeme@postgres-staging:5432/utservio_ci_staging
      - REDIS_URL=redis://redis-staging:6379
      - LOG_LEVEL=INFO
      - VAULT_URL=http://vault-staging:8200
    depends_on:
      - postgres-staging
      - redis-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    volumes:
      - app-data-staging:/app/data
    networks:
      - staging-network

  postgres-staging:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=utservio_ci_staging
      - POSTGRES_USER=utservio
      - POSTGRES_PASSWORD=changeme
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utservio -d utservio_ci_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - staging-network

  redis-staging:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data-staging:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - staging-network

  vault-staging:
    image: vault:latest
    ports:
      - "8201:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=staging-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - staging-network

  prometheus-staging:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-staging:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - staging-network

  grafana-staging:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data-staging:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus-staging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - staging-network

volumes:
  postgres-data-staging:
  redis-data-staging:
  app-data-staging:
  prometheus-data-staging:
  grafana-data-staging:

networks:
  staging-network:
    driver: bridge
