services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utservio-ci-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-utservio}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-utservio_ci}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-network
    volumes:
      - app-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: utservio-ci-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-utservio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-utservio_ci}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-utservio} -d ${POSTGRES_DB:-utservio_ci}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

volumes:
  postgres-data:
  app-data:

networks:
  ci-network:
    driver: bridge
