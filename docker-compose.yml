version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: competitor_intel_db
    environment:
      POSTGRES_USER: utservio
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: utservio_ci
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utservio -d utservio_ci"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
